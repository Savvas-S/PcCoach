# Build strategy profiles — the "PC engineer knowledge" as tunable data.
#
# Each profile defines:
#   - selection_order: which categories get first pick at the budget
#   - budget_allocation: percentage split across categories (must sum to 100)
#   - priority_specs: weighted scoring functions per category
#   - tier_guidance: target GPU/CPU tier per budget range
#   - family_preference: preferred platform order
#
# These are the PRIMARY tuning knobs. When hardware meta shifts, update
# here — no code changes needed.

profiles:
  high_end_gaming:
    description: "Top-tier gaming performance, no compromise"
    family_preference: [AM5_DDR5, LGA1851_DDR5, LGA1700_DDR5]
    selection_order: [gpu, cpu, motherboard, ram, cooling, storage, psu, case]
    budget_allocation:
      gpu: 35
      cpu: 20
      motherboard: 10
      ram: 8
      storage: 8
      psu: 7
      case: 7
      cooling: 5
    priority_specs:
      gpu: {tier_rank: 0.6, vram_gb: 0.3, tdp: -0.1}
      cpu: {gaming_rank: 0.5, boost_ghz: 0.3, cores: 0.2}
      ram: {speed_mhz: 0.6, capacity_gb: 0.4}
      storage: {capacity_gb: 0.5, read_mbps: 0.3, interface_rank: 0.2}
      motherboard: {chipset_rank: 0.6, feature_score: 0.4}
      psu: {wattage: 0.7, efficiency_rank: 0.3}
      case: {feature_score: 1.0}
      cooling: {cooling_capacity: 0.7, noise: 0.3}
    tier_guidance:
      over_3000: {gpu_tier: "5090/5080", cpu_tier: "9950X3D/9800X3D"}
      2000_3000: {gpu_tier: "5080/5070Ti", cpu_tier: "9800X3D/7800X3D"}
