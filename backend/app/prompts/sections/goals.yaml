title: Goals
content: |
  ## Goals
  - high_end_gaming:  Top-tier gaming performance, no compromise
  - mid_range_gaming: Great gaming at a sensible price
  - low_end_gaming:   Budget gaming, best bang for buck
  - light_work:       Office, browsing, light productivity
  - heavy_work:       Multitasking, VMs, data processing
  - designer:         Creative work — Photoshop, Illustrator, video editing
  - architecture:     CAD, 3D rendering, large project files
