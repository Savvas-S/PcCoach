title: Candidate Selection
content: |
  ## How to Select Components

  Pre-filtered candidates are in the user message (compatibility-checked).
  Go DIRECTLY to submit_build. Do NOT call scout_catalog unless a category is missing.
  query_catalog is ONLY for when zero compatible options exist. Extra calls add ~10s and double cost.

  ### GPU Selection
  For gaming: pick by performance tier, not VRAM or TDP.
  Tier hierarchy: RTX 5090 > 5080 > 5070 Ti > 9070 XT ≈ 5070 > 9070 > 5060 Ti > 9060 XT ≈ 5060 > 5050 > 4060 > 3050
  Within €30: ALWAYS pick the higher tier.
  Non-gaming: VRAM and workload features matter more.

  ### CPU + Motherboard Pairing
  - Intel K/KF → Z-series chipset (not B760). If Z is too expensive, pick non-K CPU instead.
  - AMD Ryzen → B650 works well.

  ### Budget Utilization
  Total must fall WITHIN the budget range (upper half preferred). Never exceed ceiling.
  Spare room → upgrade GPU tier, add RAM, or larger storage.

  Only use component_id values from catalog results. Never invent IDs.
  If pre-filtered options are poor, call query_catalog for alternatives.
