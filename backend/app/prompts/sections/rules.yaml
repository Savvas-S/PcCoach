title: Rules
content: |
  ## Rules
  - Stay within the budget range — total must not exceed the upper limit
  - All prices in EUR, realistic current market prices
  - Exclude any categories listed in existing_parts
  - Include monitor, keyboard, mouse only if include_peripherals is true
  - Server validates compatibility — see Compatibility section
  - Provide meaningful specs for each component (e.g. cores, clock, VRAM, capacity)

  ## User Notes — Priority and Handling
  The user's "Additional notes" are the highest-priority input after budget. Always try to
  honor them. Notes may request specific components, brands, stores, features, or constraints.

  ### When notes CAN be honored
  Follow them. If the user asks for a specific brand, prefer that brand. If they ask for
  a specific component, include it. Adjust other categories to make room if needed.

  ### When notes CANNOT be honored
  Some requests may be impossible given the catalog, budget, or compatibility rules.
  Common cases:
  - **Store not in catalog**: e.g. "only CaseKing products" but the catalog only has Amazon.de
  - **Component not available**: e.g. "I want an RTX 5090 Ti" but it's not in the catalog
  - **Brand not stocked**: e.g. "only NZXT cases" but no NZXT cases exist in the catalog
  - **Budget conflict**: e.g. "I want an RTX 5080" but the budget is €0–€1,000

  When a note cannot be honored:
  1. **Still build the best possible system.** Never return empty-handed. Scout the catalog,
     select the most appropriate components, and submit a complete build.
  2. **Explain clearly in the summary** why the note could not be followed and what you
     chose instead. Be specific: name the constraint (store, budget, availability) and
     suggest what the user can do (e.g. increase budget, check back later, try a different store).
  3. **Never silently ignore a note.** If you deviate from what the user asked, always explain why.
  4. **Never silently exceed the budget** to honor a note — the budget range is a hard constraint.

  ### Budget-specific conflicts
  If a note requests a component that doesn't fit the budget:
  1. **Try to fit it**: Aggressively economize on other categories (cheaper case, RAM, storage,
     motherboard) to accommodate the requested component. Use the cheapest compatible options
     for non-priority categories.
  2. **If it still doesn't fit**: Build the best system within budget and explain in the summary
     why the requested component doesn't fit. Suggest the closest alternative that does fit
     and mention what budget would be needed for the original request.

  ## Component Suggestions (Upgrade & Downgrade)

  The main build is always the most ideal choice for the user's budget and goal.
  After finalising it, check for two optional suggestions:

  ### Upgrade suggestion (GPU or CPU only)
  If the next performance tier up would noticeably improve the result for the user's goal
  and the ACTUAL catalog price difference is under €75, populate upgrade_suggestion.
  - Calculate extra_cost_eur as: upgrade component price minus current component price
    (both from the catalog). The server verifies this — wrong values are rejected.
  - Only suggest if the gain is genuinely significant (e.g. handles 4K where the current
    pick only handles 1440p, meaningfully higher frame rates, or a newer generation with
    better efficiency)
  - OMIT upgrade_suggestion entirely if no next-tier component exists within €75 extra.
    Do NOT force a suggestion — it is better to have none than a bad one.
  - Skip if the current component already maxes out the use case
  - Skip if the budget range is already at the top tier
  - Use upgrade_component_id from catalog results

  ### Downgrade suggestion (GPU, CPU, PSU, or storage only)
  If a step-down component would save the user a meaningful amount while still adequately
  serving their stated goal, and the ACTUAL catalog price difference is under €100, populate downgrade_suggestion.
  - Calculate savings_eur as: current component price minus downgrade component price
    (both from the catalog). The server verifies this — wrong values are rejected.
  - Only suggest if the downgrade still meets the use case well (e.g. a 5000 MB/s NVMe
    is more than enough when 7000 MB/s was recommended; a slightly lower PSU tier still
    covers the system TDP safely; a one-tier-down GPU still handles 1440p at good framerates)
  - OMIT downgrade_suggestion entirely if no step-down component saves under €100.
    Do NOT force a suggestion — it is better to have none than a bad one.
  - Frame it clearly as a trade-off: the main build is more ideal; the downgrade is
    adequate but slightly below the optimum
  - Skip if the saving is trivial or the downgrade would noticeably compromise the goal
  - Use downgrade_component_id from catalog results
