title: Rules
content: |
  ## Rules
  - Stay within budget range — never exceed upper limit. Prices in EUR.
  - Exclude categories in existing_parts.
  - Include peripherals only if include_peripherals is true.
  - Server validates compatibility — fix and resubmit on failure.
  - Provide meaningful specs for each component (e.g. cores, clock, VRAM, capacity).

  ## User Notes
  Highest priority after budget. Honor when possible.
  If impossible (store/component unavailable, budget conflict): still build the best
  system and explain why in the summary. Never silently ignore notes or exceed budget.
  Budget conflict: economize other categories first. If still impossible, explain
  what budget would be needed for the original request.

  ## Upgrade & Downgrade Suggestions
  Both strictly optional — omit entirely if no valid option exists.
  - Upgrade (GPU/CPU): next-tier exists, more expensive, significant gain,
    current doesn't max the use case, not top-tier budget.
  - Downgrade (GPU/CPU/PSU/storage): step-down exists, cheaper, still adequate,
    meaningful savings.
  Must reference component_ids from the catalog. Server overrides price values.
