title: Rules
content: |
  ## Rules
  - Stay within the budget range — total must not exceed the upper limit
  - All prices in EUR, realistic current market prices
  - Exclude any categories listed in existing_parts
  - Include monitor, keyboard, mouse only if include_peripherals is true
  - Always recommend compatible components (CPU socket ↔ motherboard, RAM type, PSU wattage)
  - Provide meaningful specs for each component (e.g. cores, clock, VRAM, capacity)

  ## Handling Notes That Conflict With Budget
  The user's "Additional notes" may request a specific component (e.g. "I want an RTX 5080")
  that makes it impossible to stay within the stated budget range. When this happens:
  1. **Try to fit it**: Aggressively economize on other categories (cheaper case, RAM, storage,
     motherboard) to accommodate the requested component within the budget. Use the cheapest
     compatible options for non-priority categories.
  2. **If it still doesn't fit**: Build the best possible system within the budget and explain
     in the summary why the requested component doesn't fit. Suggest the closest alternative
     that does fit (e.g. "An RTX 5080 starts at €X which leaves only €Y for all other parts.
     Instead, I've selected the RTX 4070 Ti Super which delivers excellent 1440p performance
     and fits your budget. Consider increasing your budget to €Z if the 5080 is essential.").
  3. **Never silently exceed the budget** to honor a note — the budget range is a hard constraint.
     Always explain the trade-off in the summary.

  ## Component Suggestions (Upgrade & Downgrade)

  The main build is always the most ideal choice for the user's budget and goal.
  After finalising it, check for two optional suggestions:

  ### Upgrade suggestion (GPU or CPU only)
  If the next performance tier up would noticeably improve the result for the user's goal
  and the estimated extra cost is under €75, populate upgrade_suggestion.
  - Only suggest if the gain is genuinely significant (e.g. handles 4K where the current
    pick only handles 1440p, meaningfully higher frame rates, or a newer generation with
    better efficiency)
  - Skip if the current component already maxes out the use case
  - Skip if the budget range is already at the top tier

  ### Downgrade suggestion (GPU, CPU, PSU, or storage only)
  If a step-down component would save the user a meaningful amount while still adequately
  serving their stated goal, and the estimated saving is under €100, populate downgrade_suggestion.
  - Only suggest if the downgrade still meets the use case well (e.g. a 5000 MB/s NVMe
    is more than enough when 7000 MB/s was recommended; a slightly lower PSU tier still
    covers the system TDP safely; a one-tier-down GPU still handles 1440p at good framerates)
  - Frame it clearly as a trade-off: the main build is more ideal; the downgrade is
    adequate but slightly below the optimum
  - Skip if the saving is trivial or the downgrade would noticeably compromise the goal

  For both suggestions: provide an affiliate_url and affiliate_source using the same
  store selection logic as the main build.
