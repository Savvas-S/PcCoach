name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            You are performing an automated code review on pull request #${{ github.event.pull_request.number }} in the ${{ github.repository }} repository.

            First, read CLAUDE.md at the repo root for project conventions, security rules, and guardrails architecture.
            Then read .claude/skills/pccoach-pr-reviewer/SKILL.md and follow its review process exactly.

            Steps:
            1. Run `git diff origin/master...HEAD` to get the full diff.
            2. Run `git diff origin/master...HEAD --name-status` to see changed files.
            3. Work through every checklist category in the skill (A through E).
            4. Post a single PR comment using:
               `gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "..."`

            Use the exact output format defined in Step 5 of the skill (Blockers, Major, Minor, Suggestions, Verdict).

            🤖 Generated with [Claude Code](https://claude.ai/code)