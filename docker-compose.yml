services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    env_file:
      - ./telegram_bot/.env
    depends_on:
      - backend
    restart: unless-stopped
